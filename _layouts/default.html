---
layout: compress
---
<!doctype html>
<html class="no-js" lang="{% if site.language == nil %}en{% else %}{{ site.language }}{% endif %}">
<head>
	{% include _head.html %}
	<script>
	(function(){
	  var stored = localStorage.getItem('eot-theme');
	  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
	  if (stored === 'dark' || (!stored && prefersDark)) {
	    document.documentElement.classList.add('dark-mode');
	  }
	})();
	</script>
</head>
<body id="top-of-page" class="{{ layout.format }}">
	<button id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">🌙</button>
	{% unless page.skip_boilerplate %}
	{% include _navigation.html %}
	{% endunless %}

	{% include _masthead.html %}
	{{ content }}

	{% unless page.skip_boilerplate %}
	{% include _footer.html %}
	{% endunless %}

	{% include _footer_scripts.html %}
</body>
</html>
