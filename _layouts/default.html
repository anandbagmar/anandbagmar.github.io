---
layout: compress
---
<!doctype html>
<html class="no-js" lang="{% if site.language == nil %}en{% else %}{{ site.language }}{% endif %}">
<head>
	{% include _head.html %}
	<script>
	(function(){
	  var stored = localStorage.getItem('eot-theme');
	  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
	  if (stored === 'dark' || (!stored && prefersDark)) {
	    document.documentElement.classList.add('dark-mode');
	  }
	})();
	</script>
</head>
<body id="top-of-page" class="{{ layout.format }}">
	{% unless page.skip_boilerplate %}
	{% include _navigation.html %}
	{% endunless %}

	{% include _masthead.html %}
	{{ content }}

	{% unless page.skip_boilerplate %}
	{% include _footer.html %}
	{% endunless %}

	{% include _footer_scripts.html %}
	<script>
	(function () {
	  var btn = document.getElementById('theme-toggle');
	  if (!btn) return;
	  function isDark() { return document.documentElement.classList.contains('dark-mode'); }
	  function updateIcon() {
	    btn.textContent = isDark() ? 'LIGHT MODE' : 'DARK MODE';
	    btn.setAttribute('aria-label', isDark() ? 'Switch to light mode' : 'Switch to dark mode');
	  }
	  updateIcon();
	  btn.addEventListener('click', function () {
	    var dark = !isDark();
	    document.documentElement.classList.toggle('dark-mode', dark);
	    localStorage.setItem('eot-theme', dark ? 'dark' : 'light');
	    updateIcon();
	  });
	}());
	</script>
</body>
</html>
