<div class="eot-search-wrap">

  <div class="eot-search-box">
    <input type="search" id="eot-search-input" placeholder="Search posts, pages, tags…" autocomplete="off" autofocus />
    <span class="eot-search-icon">🔍</span>
  </div>

  <div id="eot-search-results" class="eot-search-results" aria-live="polite"></div>

  <div class="eot-search-external" id="eot-search-external" style="display:none">
    <p class="eot-search-external-label">Not finding what you need?</p>
    <a id="eot-google-link" class="button small radius" href="#" target="_blank" rel="noopener noreferrer">
      Search Google for this site
    </a>
  </div>

</div>

<style>
.eot-search-wrap { max-width: 720px; margin: 0 auto; }

.eot-search-box {
  position: relative;
  margin-bottom: 1.5rem;
}
#eot-search-input {
  width: 100%;
  padding: 0.75rem 2.5rem 0.75rem 1rem;
  font-size: 1rem;
  border: 2px solid #c0c8e8;
  border-radius: 6px;
  outline: none;
  box-sizing: border-box;
  background: #f8f9fd;
  color: #1a1a2e;
  transition: border-color 0.15s;
}
#eot-search-input:focus { border-color: #283890; background: #fff; }
.eot-search-icon {
  position: absolute;
  right: 0.8rem;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  font-size: 1.1rem;
}

.eot-search-results { margin-bottom: 1.5rem; }
.eot-result-item {
  border-left: 4px solid #3949ab;
  padding: 0.7rem 1rem;
  background: #f4f6fd;
  border-radius: 0 6px 6px 0;
  margin-bottom: 0.75rem;
}
.eot-result-title {
  font-size: 1rem;
  font-weight: 700;
  margin: 0 0 0.2rem;
}
.eot-result-title a { color: #283890; text-decoration: none; }
.eot-result-title a:hover { color: #0b9444; }
.eot-result-meta {
  font-size: 0.75rem;
  color: #6b7a99;
  margin-bottom: 0.3rem;
}
.eot-result-excerpt {
  font-size: 0.85rem;
  color: #444;
  margin: 0;
  line-height: 1.5;
}
.eot-result-excerpt mark {
  background: #fff3b0;
  border-radius: 2px;
  padding: 0 2px;
}
.eot-search-empty, .eot-search-hint {
  color: #6b7a99;
  font-size: 0.92rem;
  padding: 1rem 0;
}

.eot-search-external {
  border-top: 1px solid #dde1f0;
  padding-top: 1rem;
  margin-top: 0.5rem;
}
.eot-search-external-label {
  font-size: 0.88rem;
  color: #6b7a99;
  margin-bottom: 0.5rem;
}

/* Dark mode */
html.dark-mode #eot-search-input { background: #1a2a3a !important; color: #d0dff0 !important; border-color: #3a5a7a !important; }
html.dark-mode #eot-search-input:focus { border-color: #5ab0dc !important; background: #0d1f30 !important; }
html.dark-mode .eot-result-item { background: #1e3550 !important; border-left-color: #5ab0dc !important; }
html.dark-mode .eot-result-title a { color: #b5d0e8 !important; }
html.dark-mode .eot-result-excerpt { color: #9ab5cc !important; }
html.dark-mode .eot-result-meta { color: #7aabcc !important; }
html.dark-mode .eot-search-external { border-top-color: #243d58 !important; }
</style>

<script src="/assets/js/lunr.min.js"></script>
<script>
(function () {
  var SEARCH_JSON = '/search.json';
  var SITE_URL    = 'https://essenceoftesting.com';
  var index, docs;

  var input    = document.getElementById('eot-search-input');
  var results  = document.getElementById('eot-search-results');
  var external = document.getElementById('eot-search-external');
  var glink    = document.getElementById('eot-google-link');

  // Load index
  fetch(SEARCH_JSON)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      docs = data;
      index = lunr(function () {
        this.ref('url');
        this.field('title',   { boost: 10 });
        this.field('tags',    { boost: 6 });
        this.field('excerpt', { boost: 1 });
        data.forEach(function (doc) { this.add(doc); }, this);
      });
      // Restore query from URL ?q=
      var params = new URLSearchParams(window.location.search);
      var q = params.get('q');
      if (q) { input.value = q; runSearch(q); }
    })
    .catch(function (e) {
      results.innerHTML = '<p class="eot-search-hint">Search index could not be loaded.</p>';
    });

  input.addEventListener('input', function () {
    var q = input.value.trim();
    // Update URL without reloading
    var url = q ? '?q=' + encodeURIComponent(q) : window.location.pathname;
    history.replaceState(null, '', url);
    runSearch(q);
  });

  function runSearch(q) {
    if (!index) return;
    if (!q) {
      results.innerHTML = '<p class="eot-search-hint">Start typing to search across all posts and pages.</p>';
      external.style.display = 'none';
      return;
    }

    var hits;
    try {
      // Try exact query first, fall back to wildcard on each term
      hits = index.search(q);
      if (hits.length === 0) {
        var wildcard = q.trim().split(/\s+/).map(function (t) {
          return t.replace(/[*~^+\-]/g, '') + '*';
        }).join(' ');
        hits = index.search(wildcard);
      }
    } catch (e) { hits = []; }

    // Update Google link
    glink.href = 'https://www.google.com/search?q=' + encodeURIComponent(q + ' site:essenceoftesting.com');
    external.style.display = 'block';

    if (hits.length === 0) {
      results.innerHTML = '<p class="eot-search-empty">No results for <strong>' + esc(q) + '</strong>.</p>';
      return;
    }

    var html = hits.slice(0, 30).map(function (hit) {
      var doc = docs.find(function (d) { return d.url === hit.ref; });
      if (!doc) return '';
      var excerpt = highlight(doc.excerpt, q);
      var meta = [doc.date, doc.tags].filter(Boolean).join(' · ');
      return '<div class="eot-result-item">'
        + '<p class="eot-result-title"><a href="' + esc(doc.url) + '">' + esc(doc.title) + '</a></p>'
        + (meta ? '<p class="eot-result-meta">' + esc(meta) + '</p>' : '')
        + (excerpt ? '<p class="eot-result-excerpt">' + excerpt + '</p>' : '')
        + '</div>';
    }).join('');

    results.innerHTML = '<p class="eot-search-hint">' + hits.length + ' result' + (hits.length === 1 ? '' : 's') + ' for <strong>' + esc(q) + '</strong></p>' + html;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function highlight(text, q) {
    if (!text) return '';
    // Find best excerpt window around first match
    var terms = q.trim().split(/\s+/).filter(Boolean);
    var re = new RegExp('(' + terms.map(function(t){ return t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }).join('|') + ')', 'gi');
    var match = re.exec(text);
    var start = match ? Math.max(0, match.index - 80) : 0;
    var snippet = (start > 0 ? '…' : '') + esc(text.slice(start, start + 220)) + (text.length > start + 220 ? '…' : '');
    // Re-highlight in escaped snippet
    var reEsc = new RegExp('(' + terms.map(function(t){ return esc(t).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }).join('|') + ')', 'gi');
    return snippet.replace(reEsc, '<mark>$1</mark>');
  }
})();
</script>
